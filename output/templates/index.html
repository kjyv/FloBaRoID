<!doctype html>
<html lang="en">
    <head>
        <title>Identification results</title>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/normalize.min.css">
        <link rel="stylesheet" href="css/main.css">
        <script src="js/plotly.min.js" type="text/javascript"></script>
    </head>
    <body>
        {% for f in figures %}
        {{ f }}
        {% endfor %}
        <div id="console">
            {{ text }}
        </div>
        <script src="js/ansi_up.js" type="text/javascript"></script>
        <script type="text/javascript">
            var cdiv = document.getElementById("console");
            var txt  = cdiv.innerHTML;
            var html = ansi_up.ansi_to_html(txt);
            cdiv.innerHTML = html;

            // adapt plotly plots for dark/light mode
            (function() {
                var isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                var fontColor = isDark ? "#ccc" : "#222";
                var gridColor = isDark ? "#444" : "#eee";

                var plots = document.querySelectorAll(".plotly-graph-div");
                plots.forEach(function(plot) {
                    var axisUpdate = {};
                    var layout = plot.layout || {};
                    // update all xaxis/yaxis variants (xaxis, xaxis2, xaxis3, ...)
                    for (var key in layout) {
                        if (key.match(/^[xy]axis\d*$/)) {
                            axisUpdate[key + ".color"] = fontColor;
                            axisUpdate[key + ".gridcolor"] = gridColor;
                        }
                    }
                    axisUpdate["font.color"] = fontColor;
                    axisUpdate["legend.font.color"] = fontColor;
                    Plotly.relayout(plot, axisUpdate);
                });
            })();
        </script>
    </body>
</html>
